version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BSS Explorer — docker-compose.yml (production OVH)
# Services : app (Streamlit + API FastAPI) + nginx (reverse proxy) + certbot (SSL)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Application BSS Explorer ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bss_app
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_PORT=8501
      - API_PORT=8001
    volumes:
      - app_data:/app/data
    networks:
      - bss_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: bss_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - bss_network
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Certbot (renouvellement SSL automatique) ──────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: bss_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renouvellement automatique toutes les 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - bss_network

volumes:
  app_data:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

networks:
  bss_network:
    driver: bridge
