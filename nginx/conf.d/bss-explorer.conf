# ─────────────────────────────────────────────────────────────────────────────
# BSS Explorer — Configuration Nginx
# Remplacer "votre-domaine.com" par votre vrai domaine
# ─────────────────────────────────────────────────────────────────────────────

# ── Serveur HTTP (port 80) ────────────────────────────────────────────────────
# Phase 1 : HTTP seul (avant Let's Encrypt)
# Phase 2 : Redirection vers HTTPS (décommenter après obtention du certificat)
server {
    listen 80;
    listen [::]:80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Défi ACME pour Let's Encrypt (toujours actif)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Phase 1 : Proxy direct en HTTP ───────────────────────────────────────
    # Commenter ce bloc après activation HTTPS
    location / {
        proxy_pass http://app:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://app:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Phase 2 : Redirection HTTPS ──────────────────────────────────────────
    # Décommenter après avoir obtenu le certificat SSL :
    # return 301 https://$host$request_uri;
}

